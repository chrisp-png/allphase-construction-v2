<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- All Phase Construction USA - Red Roofline Favicon -->
  <!-- Dark background circle for visibility on light & dark tabs -->
  <rect width="512" height="512" rx="64" fill="#1a1a2e"/>
  <!-- Outer roofline (larger chevron) -->
  <path d="M256 80 L460 300 L410 300 L256 146 L102 300 L52 300 Z" fill="#e60012"/>
  <!-- Inner roofline (smaller chevron, offset down-right slightly) -->
  <path d="M280 170 L440 340 L395 340 L280 225 L165 340 L120 340 Z" fill="#e60012"/>
  <!-- Subtle white dividing line between the two rooflines -->
  <path d="M280 170 L165 340" stroke="#1a1a2e" stroke-width="8" fill="none"/>
</svg>
