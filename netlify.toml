[build]
publish = "dist"
  command = "npx vite build && node scripts/prerender-static.mjs"

[build.environment]
NODE_VERSION = "20"

[build.processing]
skip_processing = false

  [build.processing.css]
  bundle = true
  minify = true

  [build.processing.js]
  bundle = true
  minify = true

  [build.processing.html]
  pretty_urls = false

  [build.processing.images]
  compress = true

[[plugins]]
package = "netlify-plugin-cache"

# Lighthouse plugin - fail_deploy = false so unknown scores don't block deploys
[[plugins]]
package = "@netlify/plugin-lighthouse"
[plugins.inputs]
fail_deploy_on_score_thresholds = false

[[plugins.inputs.audits]]
path = "/"
output_path = "reports/lighthouse-home.html"

[[plugins.inputs.audits]]
path = "/boca-raton"
output_path = "reports/lighthouse-boca-raton.html"

[[plugins.inputs.audits]]
path = "/fort-lauderdale"
output_path = "reports/lighthouse-fort-lauderdale.html"

[[plugins.inputs.audits]]
path = "/roof-repair"
output_path = "reports/lighthouse-roof-repair.html"

[[plugins.inputs.audits]]
path = "/"
output_path = "reports/lighthouse-home-desktop.html"
preset = "desktop"

[plugins.inputs.thresholds]
performance = 0.5
accessibility = 0.9
best-practices = 0.8
seo = 0.9

[[headers]]
for = "/*"
[headers.values]
X-Robots-Tag = "index, follow"

[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.jpg"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.png"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.webp"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.css"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.js"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# ═══════════════════════════════════════════════════════════════════════════
# REDIRECTS - Host canonicalization (www -> non-www, http -> https)
# These MUST be first. Netlify.toml redirects run AFTER _redirects file.
# ═══════════════════════════════════════════════════════════════════════════

[[redirects]]
from = "https://www.allphaseconstructionfl.com/*"
to = "https://allphaseconstructionfl.com/:splat"
status = 301
force = true

[[redirects]]
from = "http://allphaseconstructionfl.com/*"
to = "https://allphaseconstructionfl.com/:splat"
status = 301
force = true

[[redirects]]
from = "http://www.allphaseconstructionfl.com/*"
to = "https://allphaseconstructionfl.com/:splat"
status = 301
force = true

# ═══════════════════════════════════════════════════════════════════════════
# REDIRECTS - Legacy and structural redirects
# ═══════════════════════════════════════════════════════════════════════════

[[redirects]]
from = "/locations/deerfield-beach/service-area/*"
to = "/locations/:splat"
status = 301
force = true

[[redirects]]
from = "/roofing-services/*"
to = "/roof-repair/:splat"
status = 301
force = true

[[redirects]]
from = "/service-area/*"
to = "/locations/:splat"
status = 301
force = true

# Legacy service-area URLs redirect to city pages (Rule A - without trailing slash)
[[redirects]]
from = "/locations/:parent/service-area/:city"
to = "/locations/:city"
status = 301
force = true

# Legacy service-area URLs redirect to city pages (Rule B - with trailing slash)
[[redirects]]
from = "/locations/:parent/service-area/:city/"
to = "/locations/:city"
status = 301
force = true

[[redirects]]
from = "/roofing-contractor-deerfield-beach-fl"
to = "/locations/deerfield-beach/"
status = 301
force = true

# NOTE: All roof-repair redirect rules are managed in _redirects file
# (whitelist, hub page, catch-all, and SPA fallback)

# ═══════════════════════════════════════════════════════════════════════════
# REWRITES - Serve pre-rendered location pages (pretty_urls is OFF)
# With pretty_urls = false, we need explicit rewrites to serve index.html
# from pre-rendered location directories.
# ═══════════════════════════════════════════════════════════════════════════

[[redirects]]
from = "/locations/:city/"
to = "/locations/:city/index.html"
status = 200

[[redirects]]
from = "/locations/:city/:sub/"
to = "/locations/:city/:sub/index.html"
status = 200

[[headers]]
  for = "/robots.txt"
  [headers.values]
  Content-Type = "text/plain"
  Cache-Control = "public, max-age=3600"
