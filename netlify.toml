[build]
publish = "dist"
command = "npx vite build"

[build.environment]
NODE_VERSION = "20"

[build.processing]
skip_processing = false

[build.processing.css]
bundle = true
minify = true

[build.processing.js]
bundle = true
minify = true

[build.processing.html]
pretty_urls = false

[build.processing.images]
compress = true

[[plugins]]
package = "netlify-plugin-cache"

[[plugins]]
package = "@netlify/plugin-lighthouse"

[plugins.inputs]
[[plugins.inputs.audits]]
path = "/"
output_path = "reports/lighthouse-home.html"

[[plugins.inputs.audits]]
path = "/boca-raton"
output_path = "reports/lighthouse-boca-raton.html"

[[plugins.inputs.audits]]
path = "/fort-lauderdale"
output_path = "reports/lighthouse-fort-lauderdale.html"

[[plugins.inputs.audits]]
path = "/roof-repair"
output_path = "reports/lighthouse-roof-repair.html"

[[plugins.inputs.audits]]
path = "/"
output_path = "reports/lighthouse-home-desktop.html"
preset = "desktop"

[plugins.inputs.thresholds]
performance = 0.7
accessibility = 0.9
best-practices = 0.8
seo = 0.9

[[headers]]
for = "/*"

[headers.values]
X-Robots-Tag = "index, follow"

[[headers]]
for = "/assets/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.jpg"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.png"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.webp"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.css"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.js"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# === MASTER OVERRIDE: SILO ARCHITECTURE 301 REDIRECTS ===
# These MUST take precedence over all other routing logic
# Force = true ensures these override any static files

[[redirects]]
from = "/locations/deerfield-beach/service-area/*"
to = "/locations/:splat"
status = 301
force = true

[[redirects]]
from = "/roofing-services/*"
to = "/roof-repair/:splat"
status = 301
force = true

[[redirects]]
from = "/locations/deerfield-beach/service-area/:city/top-5-roofer"
to = "/locations/:city"
status = 301
force = true

# Additional cleanup redirects for old patterns
[[redirects]]
from = "/service-area/*"
to = "/locations/:splat"
status = 301
force = true

[[redirects]]
from = "/locations/*/service-area/*"
to = "/locations/:splat"
status = 301
force = true

# === END MASTER OVERRIDE REDIRECTS ===

[[redirects]]
from = "/locations/deerfield-beach"
to = "/index.html"
status = 200
force = true

[[redirects]]
from = "/locations/boca-raton"
to = "/index.html"
status = 200
force = true

[[redirects]]
from = "/locations/fort-lauderdale"
to = "/index.html"
status = 200
force = true

[[redirects]]
from = "/locations/coral-springs"
to = "/index.html"
status = 200
force = true

[[redirects]]
from = "/locations/delray-beach"
to = "/index.html"
status = 200
force = true

[[redirects]]
from = "/locations/boynton-beach"
to = "/index.html"
status = 200
force = true

[[redirects]]
from = "/locations/wellington"
to = "/index.html"
status = 200
force = true

[[redirects]]
from = "/locations/west-palm-beach"
to = "/index.html"
status = 200
force = true

[[redirects]]
from = "/locations/coconut-creek"
to = "/index.html"
status = 200
force = true

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
force = false
conditions = {Role = ["*"]}