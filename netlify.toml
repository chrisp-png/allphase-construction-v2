[build]
publish = "dist"
command = "npm run build && node scripts/submit-indexnow.mjs"

[build.environment]
NODE_VERSION = "20"

[build.processing]
skip_processing = false

[build.processing.css]
bundle = false
minify = false

[build.processing.js]
bundle = false
minify = false

[build.processing.html]
pretty_urls = false

[build.processing.images]
compress = true

[[plugins]]
package = "netlify-plugin-cache"

[[edge_functions]]
function = "strip-slash"
path = "/*/"

[[redirects]]
from = "/wind-mitigation-inspection"
to = "/roof-inspection/"
status = 301
force = true

[[redirects]]
from = "/roofing-services/residential-roofing"
to = "/roofing-services/"
status = 301
force = true

[[redirects]]
from = "/locations/deerfield-beach/service-area/:city/top-5-roofer"
to = "/locations/:city"
status = 301
force = true

[[redirects]]
from = "/locations/deerfield-beach/service-area/:city/top-5-roofer/*"
to = "/locations/:city"
status = 301
force = true

[[redirects]]
from = "/locations/deerfield-beach/service-area/:city"
to = "/locations/:city/"
status = 301

[[redirects]]
from = "/locations/deerfield-beach/service-area/:city/*"
to = "/locations/:city/"
status = 301

[[redirects]]
from = "/sitemap.xml"
to = "/sitemap.xml"
status = 200

[[redirects]]
from = "/robots.txt"
to = "/robots.txt"
status = 200

[[redirects]]
from = "/sitemap.html"
to = "/sitemap.html"
status = 200

[[redirects]]
from = "/favicon.svg"
to = "/favicon.svg"
status = 200

[[redirects]]
from = "/llms.txt"
to = "/llms.txt"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
force = false

[[headers]]
for = "/*"

[headers.values]
X-Robots-Tag = "index, follow"

[[headers]]
for = "/assets/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.jpg"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.png"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.webp"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.css"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.js"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/robots.txt"

[headers.values]
Content-Type = "text/plain"
Cache-Control = "public, max-age=3600"

[[headers]]
for = "/sitemap.xml"

[headers.values]
Content-Type = "application/xml"
Cache-Control = "public, max-age=3600"

[[headers]]
for = "/favicon.svg"

[headers.values]
Content-Type = "image/svg+xml"
Cache-Control = "public, max-age=86400"

[[headers]]
for = "/llms.txt"

[headers.values]
Content-Type = "text/plain"
Cache-Control = "public, max-age=3600"
