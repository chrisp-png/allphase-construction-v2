[build]
publish = "dist"
  command = "npx vite build && node scripts/prerender-static.mjs"

[build.environment]
NODE_VERSION = "20"

[build.processing]
skip_processing = false

  [build.processing.css]
  bundle = true
  minify = true

  [build.processing.js]
  bundle = true
  minify = true

  [build.processing.html]
  pretty_urls = false

  [build.processing.images]
  compress = true

[[plugins]]
package = "netlify-plugin-cache"

# Lighthouse plugin disabled - was causing deploy failures on preview URLs
# [[plugins]]
# package = "@netlify/plugin-lighthouse"

[[headers]]
for = "/*"
[headers.values]
X-Robots-Tag = "index, follow"

[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.jpg"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.png"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.webp"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.css"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.js"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# All redirects managed in public/_redirects file

[[headers]]
  for = "/robots.txt"
  [headers.values]
  Content-Type = "text/plain"
  Cache-Control = "public, max-age=3600"
