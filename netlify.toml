[build]
publish = "dist"
command = "npx vite build && node scripts/prerender-static.mjs && node scripts/submit-indexnow.mjs"

[build.environment]
NODE_VERSION = "20"

[build.processing]
skip_processing = false

[build.processing.css]
bundle = true
minify = true

[build.processing.js]
bundle = true
minify = true

[build.processing.html]
pretty_urls = false

[build.processing.images]
compress = true

[[plugins]]
package = "netlify-plugin-cache"

[[edge_functions]]
function = "strip-slash"
path = "/*/"

[[redirects]]
from = "/locations/deerfield-beach/service-area/boynton-beach/*"
to = "/locations/boynton-beach/"
status = 301

