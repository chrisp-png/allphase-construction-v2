[[headers]]
for = "/*"

[headers.values]
X-Robots-Tag = "index, follow"

[[headers]]
for = "/assets/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.jpg"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.png"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.webp"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.css"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.js"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/robots.txt"

[headers.values]
Content-Type = "text/plain"
Cache-Control = "public, max-age=3600"

[[headers]]
for = "/sitemap.xml"

[headers.values]
Content-Type = "application/xml"
Cache-Control = "public, max-age=3600"

[[headers]]
for = "/favicon.svg"

[headers.values]
Content-Type = "image/svg+xml"
Cache-Control = "public, max-age=86400"
