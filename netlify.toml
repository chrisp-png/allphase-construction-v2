[build]
publish = "dist"
command = "npx vite build && node scripts/prerender-static.mjs && node scripts/submit-indexnow.mjs"

[build.environment]
NODE_VERSION = "20"

[build.processing]
skip_processing = false

[build.processing.css]
bundle = true
minify = true

[build.processing.js]
bundle = true
minify = true

[build.processing.html]
pretty_urls = false

[build.processing.images]
compress = true

[[plugins]]
package = "netlify-plugin-cache"

[[edge_functions]]
function = "strip-slash"
path = "/*/"

# Run edge function on WordPress artifact paths for 410 Gone
[[edge_functions]]
function = "strip-slash"
path = "/wp-content/*"

[[edge_functions]]
function = "strip-slash"
path = "/wp-admin/*"

[[edge_functions]]
function = "strip-slash"
path = "/wp-includes/*"

[[edge_functions]]
function = "strip-slash"
path = "/wp-json/*"

[[edge_functions]]
function = "strip-slash"
path = "/wp-login.php"

[[edge_functions]]
function = "strip-slash"
path = "/xmlrpc.php"

[[edge_functions]]
function = "strip-slash"
path = "/feed"

# Blog redirect edge function — handles dead blog URLs before static file resolution
[[edge_functions]]
function = "blog-redirects"
path = "/blog/*"

[[redirects]]
from = "/wind-mitigation-inspection"
to = "/roof-inspection/"
status = 301
force = true

[[redirects]]
from = "/roofing-services/residential-roofing"
to = "/roofing-services/"
status = 301
force = true

[[redirects]]
from = "/locations/deerfield-beach/service-area/:city/top-5-roofer"
to = "/locations/:city"
status = 301
force = true

[[redirects]]
from = "/locations/deerfield-beach/service-area/:city/top-5-roofer/*"
to = "/locations/:city"
status = 301
force = true

[[redirects]]
from = "/locations/deerfield-beach/service-area/:city"
to = "/locations/:city/"
status = 301

[[redirects]]
from = "/locations/deerfield-beach/service-area/:city/*"
to = "/locations/:city/"
status = 301

[[redirects]]
from = "/sitemap.xml"
to = "/sitemap.xml"
status = 200

[[redirects]]
from = "/robots.txt"
to = "/robots.txt"
status = 200

[[redirects]]
from = "/sitemap.html"
to = "/sitemap.html"
status = 200

[[redirects]]
from = "/favicon.svg"
to = "/favicon.svg"
status = 200

# ======================================================================
# GSC Soft 404 fixes — 2026-03-30
# ======================================================================
# Removed in PR-38 (2026-04-27):
#   - /roof-repair/north-lauderdale → /roof-repair (was killing a real
#     prerendered page; north-lauderdale is in cities.json AND has an
#     active /locations/north-lauderdale hub, so the redirect was
#     stale post-PR-25 NuclearMetadata fix).
#   - /roof-inspection/lake-park → /roof-inspection (same pattern).
# Kept intentionally:
#   - /locations/westlake → /locations/west-palm-beach (consolidation).
#   - /locations/palm-beach → /locations/west-palm-beach (consolidation).
#   - /locations/lauderdale-by-the-sea → /locations/fort-lauderdale (consolidation).
#   - /roof-inspection/westlake → /roof-inspection (kept for consistency
#     with /locations/westlake consolidation — removing this would have
#     created an inconsistent state where the inspection page serves real
#     westlake content while the location hub redirects away to WPB).
# ======================================================================
[[redirects]]
from = "/locations/westlake"
to = "/locations/west-palm-beach"
status = 301
force = true

[[redirects]]
from = "/locations/palm-beach"
to = "/locations/west-palm-beach"
status = 301
force = true

[[redirects]]
from = "/locations/lauderdale-by-the-sea"
to = "/locations/fort-lauderdale"
status = 301
force = true

[[redirects]]
from = "/roof-inspection/westlake"
to = "/roof-inspection"
status = 301
force = true

# Thanksgiving blog — permanently removed (410 Gone)
[[redirects]]
from = "/blog/happy-thanksgiving-from-all-of-us-at-all-phase-construction-usa-llc"
to = "/410.html"
status = 410
force = true

[[redirects]]
from = "/blog/how-long-will-it-take-to-replace-your-roof-in-south-florida"
to = "/blog/what-to-expect-during-a-roof-replacement-project"
status = 301
force = true

[[redirects]]
from = "/blog/what-does-a-tapered-insulation-system-mean-on-a-roof-and-how-does-it-affect-the-air-conditioning-stands"
to = "/blog"
status = 301
force = true

[[redirects]]
from = "/blog/clay-roof-tiles-an-important-chapter-in-the-history-of-roofing-and-a-popular-choice-for-residential-roofs-today"
to = "/blog/why-choose-tile-roofing-in-south-florida"
status = 301
force = true

[[redirects]]
from = "/blog/is-tar-still-used-in-2024-to-seal-a-roof"
to = "/blog"
status = 301
force = true

[[redirects]]
from = "/blog/services-that-all-phase-construction-provides"
to = "/blog"
status = 301
force = true

[[redirects]]
from = "/blog/common-roofing-myths-that-homeowners-still-believe"
to = "/blog"
status = 301
force = true

[[redirects]]
from = "/blog/helping-your-association-plan-for-roofing-budgets-with-confidence"
to = "/blog"
status = 301
force = true

[[redirects]]
from = "/boca-raton"
to = "/locations/boca-raton"
status = 301
force = true

# ======================================================================
# Blog SPA fallback — serves React app for blog paths without prerendered HTML
# The blog-redirects edge function handles dead URLs before this fires
# ======================================================================
[[redirects]]
from = "/blog/*"
to = "/index.html"
status = 200
force = false

# ======================================================================
# SPA fallback — must be LAST
# ======================================================================
[[redirects]]
from = "/*"
to = "/index.html"
status = 200
force = false

[[headers]]
for = "/*"

[headers.values]
X-Robots-Tag = "index, follow"

[[headers]]
for = "/assets/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.jpg"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.png"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.webp"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.css"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.js"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/robots.txt"

[headers.values]
Content-Type = "text/plain"
Cache-Control = "public, max-age=3600"

[[headers]]
for = "/sitemap.xml"

[headers.values]
Content-Type = "application/xml"
Cache-Control = "public, max-age=3600"

[[headers]]
for = "/favicon.svg"

[headers.values]
Content-Type = "image/svg+xml"
Cache-Control = "public, max-age=86400"
