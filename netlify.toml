[build]
publish = "dist"
command = "npm run build && npm run prerender:poc"

[build.environment]
NODE_VERSION = "20"

[build.processing]
skip_processing = false

[build.processing.css]
bundle = true
minify = true

[build.processing.js]
bundle = true
minify = true

[build.processing.html]
pretty_urls = false

[build.processing.images]
compress = true

[[plugins]]
package = "netlify-plugin-cache"

[[plugins]]
package = "@netlify/plugin-lighthouse"

[plugins.inputs]
[[plugins.inputs.audits]]
path = "/"
output_path = "reports/lighthouse-home.html"

[[plugins.inputs.audits]]
path = "/boca-raton"
output_path = "reports/lighthouse-boca-raton.html"

[[plugins.inputs.audits]]
path = "/fort-lauderdale"
output_path = "reports/lighthouse-fort-lauderdale.html"

[[plugins.inputs.audits]]
path = "/roof-repair"
output_path = "reports/lighthouse-roof-repair.html"

[[plugins.inputs.audits]]
path = "/"
output_path = "reports/lighthouse-home-desktop.html"
preset = "desktop"

[plugins.inputs.thresholds]
performance = 0.7
accessibility = 0.9
best-practices = 0.8
seo = 0.9

[[headers]]
for = "/*"

[headers.values]
X-Robots-Tag = "index, follow"

[[headers]]
for = "/assets/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.jpg"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.png"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.webp"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.css"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.js"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

